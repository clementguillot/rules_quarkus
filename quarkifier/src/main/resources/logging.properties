# JBoss LogManager configuration for the quarkifier CLI process.
# This configures colored console output for the quarkifier and its hot-reload watcher.

# Root logger: INFO level to console
logger.level=INFO
logger.handlers=CONSOLE

# Console handler with color support
handler.CONSOLE=org.jboss.logmanager.handlers.ConsoleHandler
handler.CONSOLE.level=ALL
handler.CONSOLE.formatter=COLOR

# Color pattern formatter — uses ANSI escape codes for terminal output
formatter.COLOR=org.jboss.logmanager.formatters.ColorPatternFormatter
formatter.COLOR.properties=pattern
formatter.COLOR.constructorProperties=pattern
formatter.COLOR.pattern=%-5p [%c{1}] %s%e%n
